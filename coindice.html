<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Flip & Dice Roller - AstronautScience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            background: #0a0a2e;
            color: #e0e0ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            image-rendering: pixelated;
        }
        h1 {
            font-size: clamp(0.8rem, 3.5vw, 1.8rem);
            color: #00ffaa;
            text-shadow: 0 0 10px #00ffaa, 4px 4px 0 #0a3a2a;
            margin-bottom: 40px;
        }
        .panels {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            width: 90%;
            max-width: 900px;
        }
        .panel {
            background: #12124a;
            border: 3px solid #7b68ee;
            box-shadow: 6px 6px 0 #050520;
            padding: 40px 30px;
            text-align: center;
            flex: 1;
            min-width: 280px;
            max-width: 400px;
        }
        .panel h2 {
            font-size: clamp(0.6rem, 2vw, 1rem);
            color: #7b68ee;
            margin-bottom: 25px;
        }
        .result-area {
            font-size: clamp(2.5rem, 8vw, 5rem);
            color: #00ffaa;
            text-shadow: 0 0 20px #00ffaa, 0 0 40px #00ffaa;
            margin: 30px 0;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .result-area.spinning {
            animation: spin-result 0.3s ease-in-out;
        }
        @keyframes spin-result {
            0% { transform: rotateX(0deg); opacity: 1; }
            50% { transform: rotateX(90deg); opacity: 0.3; }
            100% { transform: rotateX(0deg); opacity: 1; }
        }
        .coin {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #00ffaa;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            font-size: clamp(0.6rem, 2vw, 1rem);
            color: #00ffaa;
            text-shadow: 0 0 10px #00ffaa;
        }
        .coin.heads { background: rgba(0, 255, 170, 0.15); }
        .coin.tails { background: rgba(123, 104, 238, 0.15); border-color: #7b68ee; color: #7b68ee; text-shadow: 0 0 10px #7b68ee; }
        .coin.flipping {
            animation: coin-flip 0.5s ease-in-out;
        }
        @keyframes coin-flip {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(180deg); }
            100% { transform: rotateY(360deg); }
        }
        .action-btn {
            padding: 16px 36px;
            font-size: clamp(0.5rem, 1.5vw, 0.8rem);
            font-family: 'Press Start 2P', monospace;
            border: 3px solid #00ffaa;
            background: transparent;
            color: #00ffaa;
            cursor: pointer;
            box-shadow: 4px 4px 0 #0a3a2a;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .action-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #0a3a2a, 0 0 20px rgba(0, 255, 170, 0.3);
        }
        .action-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #0a3a2a;
        }
        .dice-options {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .dice-opt {
            padding: 8px 14px;
            font-size: clamp(0.35rem, 1vw, 0.55rem);
            font-family: 'Press Start 2P', monospace;
            border: 2px solid #7b68ee;
            background: transparent;
            color: #7b68ee;
            cursor: pointer;
        }
        .dice-opt.active {
            background: #7b68ee;
            color: #0a0a2e;
        }
        .dice-opt:hover { border-color: #00ffaa; color: #00ffaa; }
        .dice-opt.active:hover { background: #00ffaa; border-color: #00ffaa; }
        .dice-count {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }
        .dice-count label {
            font-size: clamp(0.4rem, 1vw, 0.55rem);
            color: #7b68ee;
        }
        .dice-count input {
            width: 60px;
            padding: 10px;
            font-size: clamp(0.5rem, 1.5vw, 0.8rem);
            font-family: 'Press Start 2P', monospace;
            border: 3px solid #7b68ee;
            background: #0a0a2e;
            color: #e0e0ff;
            text-align: center;
            outline: none;
        }
        .dice-results {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .die {
            width: 60px;
            height: 60px;
            border: 3px solid #00ffaa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.8rem, 2.5vw, 1.5rem);
            color: #00ffaa;
            text-shadow: 0 0 10px #00ffaa;
        }
        .dice-total {
            font-size: clamp(0.5rem, 1.5vw, 0.8rem);
            color: #7b68ee;
            margin-top: 15px;
        }
        .history {
            margin-top: 20px;
            font-size: clamp(0.3rem, 0.8vw, 0.45rem);
            color: #5a5a8e;
            max-height: 80px;
            overflow-y: auto;
            line-height: 2;
        }
        .back-link {
            margin-top: 40px;
            font-size: clamp(0.4rem, 1.2vw, 0.6rem);
            color: #7b68ee;
            text-decoration: none;
        }
        .back-link:hover { color: #00ffaa; }
    </style>
</head>
<body>
    <h1>COIN FLIP & DICE</h1>
    <div class="panels">
        <!-- Coin Flip -->
        <div class="panel">
            <h2>// COIN FLIP</h2>
            <div class="result-area">
                <div class="coin heads" id="coin">HEADS</div>
            </div>
            <button class="action-btn" id="flip-btn">FLIP</button>
            <div class="history" id="coin-history"></div>
        </div>

        <!-- Dice Roller -->
        <div class="panel">
            <h2>// DICE ROLLER</h2>
            <div class="dice-options">
                <button class="dice-opt active" data-sides="6">D6</button>
                <button class="dice-opt" data-sides="4">D4</button>
                <button class="dice-opt" data-sides="8">D8</button>
                <button class="dice-opt" data-sides="10">D10</button>
                <button class="dice-opt" data-sides="12">D12</button>
                <button class="dice-opt" data-sides="20">D20</button>
                <button class="dice-opt" data-sides="100">D100</button>
            </div>
            <div class="dice-count">
                <label>HOW MANY:</label>
                <input type="number" id="dice-num" value="1" min="1" max="20">
            </div>
            <div class="dice-results" id="dice-results">
                <div class="die">?</div>
            </div>
            <div class="dice-total" id="dice-total"></div>
            <button class="action-btn" id="roll-btn">ROLL</button>
            <div class="history" id="dice-history"></div>
        </div>
    </div>
    <a href="index.html" class="back-link">&lt; BACK TO ASTRONAUTSCIENCE</a>

    <script>
        // Coin Flip
        const coin = document.getElementById('coin');
        const coinHistory = document.getElementById('coin-history');
        let coinLog = [];

        document.getElementById('flip-btn').addEventListener('click', () => {
            coin.classList.add('flipping');
            setTimeout(() => {
                const isHeads = Math.random() < 0.5;
                coin.textContent = isHeads ? 'HEADS' : 'TAILS';
                coin.className = 'coin ' + (isHeads ? 'heads' : 'tails');
                coinLog.unshift(isHeads ? 'H' : 'T');
                if (coinLog.length > 20) coinLog.pop();
                coinHistory.textContent = 'HISTORY: ' + coinLog.join(' ');
            }, 500);
        });

        // Dice Roller
        let diceSides = 6;
        const diceResults = document.getElementById('dice-results');
        const diceTotal = document.getElementById('dice-total');
        const diceHistory = document.getElementById('dice-history');
        let diceLog = [];

        document.querySelectorAll('.dice-opt').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.dice-opt.active').classList.remove('active');
                btn.classList.add('active');
                diceSides = parseInt(btn.dataset.sides);
            });
        });

        document.getElementById('roll-btn').addEventListener('click', () => {
            const count = Math.min(parseInt(document.getElementById('dice-num').value) || 1, 20);
            const rolls = [];
            diceResults.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const val = Math.floor(Math.random() * diceSides) + 1;
                rolls.push(val);
                const die = document.createElement('div');
                die.className = 'die';
                die.textContent = val;
                die.style.animation = 'spin-result 0.3s ease-in-out';
                die.style.animationDelay = (i * 0.05) + 's';
                diceResults.appendChild(die);
            }
            const total = rolls.reduce((a, b) => a + b, 0);
            diceTotal.textContent = count > 1 ? 'TOTAL: ' + total : '';
            diceLog.unshift(count + 'D' + diceSides + ': ' + rolls.join('+') + (count > 1 ? '=' + total : ''));
            if (diceLog.length > 10) diceLog.pop();
            diceHistory.textContent = diceLog.join(' | ');
        });
    </script>
</body>
</html>
